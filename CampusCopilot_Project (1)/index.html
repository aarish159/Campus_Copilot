<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CampusCopilot — turns verified college notices into answers, deadlines, and actions. AI-powered campus intelligence for students, faculty, and administration." />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CampusCopilot" />
    <meta property="og:title" content="CampusCopilot — Verified Campus Intelligence" />
    <meta property="og:description" content="AI-powered answers from verified campus notices. Built for students, faculty, and administrators." />
    <meta property="og:type" content="website" />
    <title>CampusCopilot</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      #app:empty ~ * { display: none; }
    </style>
  </head>
  <body>
    <!-- Custom cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Dark mode toggle button -->
    <button id="darkToggle" title="Toggle dark mode" style="
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--navy);
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      cursor: none;
    ">🌙</button>

    <div id="app"></div>
    <div id="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="./src/app.js"></script>

    <script>
      // ── Custom Cursor ──
      const dot  = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      let mx = 0, my = 0, rx = 0, ry = 0;

      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top  = my + 'px';
      });

      (function animateRing() {
        rx += (mx - rx) * 0.13;
        ry += (my - ry) * 0.13;
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(animateRing);
      })();

      document.addEventListener('mousedown', () => {
        dot.style.transform  = 'translate(-50%,-50%) scale(0.7)';
        ring.style.transform = 'translate(-50%,-50%) scale(0.85)';
      });
      document.addEventListener('mouseup', () => {
        dot.style.transform  = 'translate(-50%,-50%) scale(1)';
        ring.style.transform = 'translate(-50%,-50%) scale(1)';
      });

      // ── Dark Mode Toggle ──
      const btn = document.getElementById('darkToggle');
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.body.classList.add('dark');
        btn.textContent = '☀️';
      }

      btn.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark');
        btn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });
    </script>
  </body>
</html>
